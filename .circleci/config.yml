version: 2.1

jobs:
  build:
    docker:
      - image: cimg/go:1.23

    steps:
      - checkout

      - restore_cache:
          keys:
            - go-mod-v2-{{ checksum "go.sum" }}

      - run: go get -t -v ./...

      - save_cache:
          key: go-mod-v2-{{ checksum "go.sum" }}
          paths:
            - "/home/circleci/go/pkg/mod"

      - run: go test ./... -race

